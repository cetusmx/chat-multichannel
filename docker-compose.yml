services:
  postgres:
    image: postgres:16
    container_name: salesflow-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-salesflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-salesflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-salesflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salesflow} -d ${POSTGRES_DB:-salesflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: salesflow-app
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && node src/index.js"
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-salesflow}:${POSTGRES_PASSWORD:-salesflow_dev}@postgres:5432/${POSTGRES_DB:-salesflow}?connection_limit=5
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_uploads:/app/backend/uploads

volumes:
  postgres_data:
  app_uploads:
