name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: salesflow
          POSTGRES_PASSWORD: salesflow_dev
          POSTGRES_DB: salesflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://salesflow:salesflow_dev@localhost:5432/salesflow?connection_limit=5

      - name: Run Prisma migrations and seed
        working-directory: ./backend
        run: |
          npx prisma migrate dev --name init --skip-generate
          npm run db:seed
        env:
          DATABASE_URL: postgresql://salesflow:salesflow_dev@localhost:5432/salesflow?connection_limit=5

      - name: Run backend tests
        working-directory: ./backend
        run: npm test
        env:
          DATABASE_URL: postgresql://salesflow:salesflow_dev@localhost:5432/salesflow?connection_limit=5
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          LOG_LEVEL: silent

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/chat-multichannel-sales-ia
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker system prune -f
